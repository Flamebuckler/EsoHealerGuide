site_name: ESO Heilerguide
site_url: https://flamebuckler.github.io/EsoHealerGuide/
repo_url: https://github.com/Flamebuckler/EsoHealerGuide
repo_name: Flamebuckler/EsoHealerGuide

theme:
  name: material
  language: de
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus aktivieren
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Hellmodus aktivieren
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Start: index.md
  - Allgemein:
    - Rasse: allgemein/race.md
    - Mundusstein: allgemein/mundus.md
    - Championpunkte: allgemein/championpoints.md
    - Verbrauchsgüter: allgemein/consumables.md
    - Allgemeine Tipps: allgemein/tips.md
    - Warum ein Zerstörungsstab auf der Backbar?: allgemein/why_destruction_staff_on_backbar.md
  - Fähigkeiten:
    - Klassenunabhängige Fähigkeiten: faehigkeiten/class_independent_skills.md
    - Klassenspezifische Fähigkeiten: faehigkeiten/class_skills.md
    - Schriftlehre: faehigkeiten/scribing.md
  - Ausrüstung:
    - Hergestellbare Ausrüstung: ausruestung/crafted_sets.md
    - Overland-Sets: ausruestung/overland_sets.md
    - Dungeon-Sets: ausruestung/dungeon_sets.md
    - Raid-Sets: ausruestung/raid_sets.md
    - Monster-Sets: ausruestung/monster_sets.md
    - Sonstige Sets: ausruestung/other_sets.md
    - Sinnvolle Kombinationen: 
      - Übersicht: ausruestung/combos.md
      - Dungeon: ausruestung/combos_dungeon.md
      - Raid: ausruestung/combos_raid.md
  - Klassen:
    - Übersicht: klassen/overview.md
    - Hüter: klassen/warden.md
    - Templer: klassen/templar.md
    - Arkanist: klassen/arcanist.md
    - Drachenritter: klassen/dragonknight.md
    - Zauberer: klassen/sorcerer.md
    - Nachtklinge: klassen/nightblade.md
    - Nekromant: klassen/necromancer.md

  - Builds:
    - Anfänger: builds/beginner_build.md
    - Dungeon: builds/dungeon_build.md
    - Raid: builds/raid_build.md


markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
